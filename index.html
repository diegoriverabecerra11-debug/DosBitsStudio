<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DosBits Studio | Future Web Design</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="glow-bg"></div>

    <header>
        <nav>
            <div class="logo">DOSBITS<span>STUDIO</span></div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Arquitectos del <span class="text-gradient">Espacio Digital</span></h1>
            <p>Creamos, reformamos y potenciamos tu presencia online con tecnología de vanguardia y gestión de redes sociales.</p>
            <a href="#contacto" class="btn-main">Solicitar propuesta</a>
        </section>

        <section id="contacto" class="form-container">
            <div class="glass-card">
                <h2>Inicia la Transmisión</h2>
                <form action="https://formspree.io/f/TU_CORREO@gmail.com" method="POST">
                    <div class="input-group">
                        <input type="text" name="nombre" placeholder="Tu Nombre" required>
                        <input type="text" name="empresa" placeholder="Nombre de la Empresa" required>
                    </div>
                    
                    <div class="input-group">
                        <input type="email" name="email" placeholder="Tu Correo" required>
                        <input type="tel" name="telefono" placeholder="Tu Teléfono">
                    </div>

                    <div class="select-group">
                        <label for="servicio">¿Qué necesitas?</label>
                        <select name="servicio" id="servicio" required>
                            <option value="web-corporativa">Web Corporativa</option>
                            <option value="landing">Landing Page</option>
                            <option value="rediseno">Rediseño Web</option>
                            <option value="tienda-online">Tienda Online</option>
                            <option value="no-lo-se">Aún no lo sé</option>
                        </select>
                    </div>

                    <textarea name="mensaje" placeholder="Explícanos tu visión..." rows="5" required></textarea>

                    <button type="submit" class="btn-submit">Enviar Solicitud</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 DosBits Studio. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
